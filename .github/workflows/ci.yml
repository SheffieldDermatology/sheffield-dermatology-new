name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lean CI for the public "info + enquiry" deployment: verify the code lints,
# type-checks and builds the way Vercel deploys it (SITE_ONLY, no database).
# The full platform's heavier suite (database integration, Playwright e2e,
# migration-drift checks) returns when the full app is deployed — see
# tests/ and TESTING.md.
jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit & integration tests
        run: npm test
        env:
          NODE_ENV: test
      - name: Production build (lean site)
        run: npm run build
        env:
          SITE_ONLY: "1"
          APP_ORIGIN: https://sheffielddermatology.com
